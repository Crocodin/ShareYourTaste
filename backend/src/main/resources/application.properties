spring.application.name=backend
server.port=8080

# DATABASE CONNECTION
# user, password, and url in run configuration
spring.datasource.driver-class-name=org.postgresql.Driver

# HIKARI CONNECTION POOL
# Minimum connections kept open even when idle
spring.datasource.hikari.minimum-idle=2
# Max connections in the pool at once
spring.datasource.hikari.maximum-pool-size=10
# How long to wait for a free connection (ms)
spring.datasource.hikari.connection-timeout=30000
# How long an idle connection stays in pool before being dropped
spring.datasource.hikari.idle-timeout=600000
# Maximum lifetime of any connection in the pool
spring.datasource.hikari.max-lifetime=1800000

# JPA / HIBERNATE
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# LOGGING / Slf4j
logging.level.root=INFO
logging.level.ubb.dbsm=DEBUG
logging.file.name=logs/app.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

# EhCache
spring.cache.type=jcache
spring.cache.jcache.config=classpath:ehcache.xml
spring.cache.jcache.provider=org.ehcache.jsr107.EhcacheCachingProvider

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
server.servlet.session.timeout=7d
server.servlet.session.cookie.max-age=604800
server.servlet.session.cookie.http-only=true