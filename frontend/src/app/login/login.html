<div class="main-container">
  <div class="auth-card">
    <div class="title-container">
      <div class="main-title">
        <h1 class="playfair-display-400">Your music,</h1>
        <h1 class="playfair-display-400">your opinions,</h1>
        <h1 class="playfair-display-400">your chart.</h1>
        <p>
          Rate albums and songs, follow what others are listening to,
          and build your taste profile.
        </p>
      </div>
    </div>

    <div class="login-container">
      <div class="login-form">
        <div class="title playfair-display-400">Welcome Back!</div>
        <div class="subtitle">Login to your account to continue</div>

        <form (ngSubmit)="onSubmit()">
          <div class="form-group">
            <label for="username">Username</label>
            <input
              type="text"
              id="username"
              [(ngModel)]="username"
              name="username"
              required
              placeholder="Enter your username"
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              [(ngModel)]="password"
              name="password"
              required
              placeholder="Enter your password"
            />
            <div class="forgot-password">
              <a href="#">Forgot Password?</a>
            </div>
          </div>

          <button type="submit">Login</button>

          @if (errorMessage) {
            <p class="error">{{ errorMessage }}</p>
          }

          <div class="register-link">
            Don't have an account? <a href="#">Register here</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
