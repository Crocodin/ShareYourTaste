<div class="page-wrapper">
  <div class="bg-image"></div>
  <div class="bg-overlay"></div>

  <header class="topbar">
    <div class="topbar-logo playfair-display-400">Rate Your Taste</div>

    <div class="topbar-search">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.3-4.3"/>
      </svg>
      <input [(ngModel)]="searchQuery" (keyup.enter)="onSearchInput()" type="text" placeholder="Search songs..." />
    </div>

    <div class="topbar-user">
      <div class="avatar" (click)="onUserClick()">U</div>
    </div>
  </header>

  <div class="content">
    <div class="song-list">
      @for (song of songs; track song.songId) {
        <div class="song-result" (click)="goToSong(song.songId)">
          <div class="song-cover-frame" [style.--cover-url]="'url(' + song.coverUrl + ')'">
            <img class="song-cover" [src]="song.coverUrl" [alt]="song.albumName" />
          </div>

          <div class="left">
            <div class="title">{{ song.songName }}</div>
            <div class="meta">{{ song.artistName }} | {{ song.albumName }}</div>
          </div>

          <div class="right">
            <div class="stars">
              @for (star of [1,2,3,4,5]; track star) {
                <span 
                  class="star"
                  [class.filled]="star <= (song.userRating || 0)"
                  [class.hovered]="star <= (song.hoveredRating || 0)"
                  (mouseenter)="song.hoveredRating = star"
                  (mouseleave)="song.hoveredRating = 0"
                  (click)="rateSong(song, star)">
                  ★
                </span>
              }
            </div>
            <div class="avg-rating">avg {{ song.songRating | number:'1.2-2' }}</div>
          </div>
        </div>
      }
    </div>

    <div class="pagination">
      @for (page of totalPagesArray(); track page) {
        <button
          class="pg-btn"
          [class.active]="page === currentPage"
          (click)="goToPage(page)">
          {{ page + 1 }}
        </button>
      }
    </div>
  </div>
</div>
